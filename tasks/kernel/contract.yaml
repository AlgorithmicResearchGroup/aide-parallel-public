num_experiments: 16  # Use all 16 H100 GPUs
num_iterations: 4

model: o4-mini
feedback_model: o4-mini

steps: 15
metric: speedup
goal: |
  Optimize the PyTorch kernel in optimize.py for runtime speed on GPU.
  Fuse operations in the forward method while ensuring the max float deviation stays small.
  Maintain the current code structure.
  Focus on GPU-specific optimizations like kernel fusion, memory coalescing, and efficient tensor operations.
eval_metric: speedup
eval: |
  After implementing changes, invoke `python evaluate_gpu.py --solution-path optimize.py --device cuda` and report the resulting speedup metric.
  Treat higher speedup as better.