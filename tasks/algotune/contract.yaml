# Optional advanced contract for AlgoTune tasks.
# Task-specific goal and eval command are injected by src/aide_runner.py.

num_experiments: 1
num_iterations: 1

# Publication-grade AlgoTune runs now use the strict benchmark path only.
# The model defaults here should point to a provider we actively use in the
# validated strict environment.
model: claude-sonnet-4-20250514
feedback_model: claude-sonnet-4-20250514

steps: 4
metric: speedup
eval_metric: speedup

goal: |
  Implement an optimized Solver class for the selected AlgoTune task.
  See solver.py for the task description and reference implementation.

eval: |
  Strict AlgoTune evaluation is injected by src/aide_runner.py and uses the
  vendored official benchmark path (train for search, test for final scoring).
